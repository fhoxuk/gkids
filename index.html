<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARRISON KIDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Archivo Black', sans-serif; background: #020617; color: #fff; overflow: hidden; }
        .hud-border { border: 4px solid #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }
        .neon-orange { color: #fb923c; text-shadow: 0 0 15px #fb923c; }
        .btn-action { background: #fb923c; color: #000; transition: 0.1s; cursor: pointer; border-radius: 20px; }
        .btn-action:active { transform: scale(0.95); }
        .player-card { background: rgba(30, 41, 59, 0.5); border: 2px solid #334155; transition: 0.2s; }
        .winner-flash { border-color: #39FF14 !important; background: #064e3b !important; box-shadow: 0 0 20px #39FF14; }
        
        #game-canvas { background: #000; border: 4px solid #334155; position: relative; overflow: hidden; height: 500px; width: 100%; border-radius: 30px; }
        .target { position: absolute; width: 120px; height: 120px; background: #ef4444; border-radius: 50%; border: 8px solid white; display: flex; align-items: center; justify-content: center; font-size: 60px; animation: pop 0.2s ease-out; box-shadow: 0 0 20px #ef4444; z-index: 10; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* Solid Dark Background for Adult Portal */
        #adult-portal { background-color: #020617; } 
    </style>
</head>
